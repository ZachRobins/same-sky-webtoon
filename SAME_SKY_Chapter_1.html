<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SAME SKY — Chapter 1: The Talker</title>
<style>
:root{--ink:#dfe5f0;--dim:#7e88a0;--warm:#e8b35a;--frost:#9cc7f0;--blood:#a31621;}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:#05070d;color:var(--ink);font-family:Georgia,serif;overflow-x:hidden}
section{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:absolute;inset:-12% -6%;z-index:0;will-change:transform}
.bg svg{width:100%;height:100%}
.txt{position:relative;z-index:5;max-width:340px;padding:28px;text-align:center;font-size:17.5px;line-height:1.85;
 opacity:0;transform:translateY(36px);transition:opacity 1.1s ease,transform 1.1s ease;text-shadow:0 2px 18px rgba(0,0,0,.9)}
section.lit .txt{opacity:1;transform:none}
.aria{font-style:italic;color:var(--frost);letter-spacing:1px}
.warmv{font-style:italic;color:#ffd9a0;letter-spacing:1px}
.bzv{font-style:italic;color:#b8e6c8;letter-spacing:1px}
.small{font-size:13px;color:var(--dim)}
.title-h{font-size:30px;letter-spacing:9px;color:#ece4d4;font-weight:normal}
.glow{animation:glowp 3.2s ease-in-out infinite}
@keyframes glowp{0%,100%{text-shadow:0 0 14px rgba(156,199,240,.25)}50%{text-shadow:0 0 34px rgba(156,199,240,.85)}}
.glow-w{animation:glowyw 3.2s ease-in-out infinite}
@keyframes glowyw{0%,100%{text-shadow:0 0 14px rgba(232,179,90,.25)}50%{text-shadow:0 0 34px rgba(232,179,90,.9)}}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50}
#coldveil{position:fixed;inset:0;background:radial-gradient(ellipse at 50% -10%, rgba(156,199,240,.30), rgba(20,40,70,.18) 55%, transparent);opacity:0;pointer-events:none;z-index:2;transition:opacity .9s}
#darkveil{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 110%, rgba(40,18,60,.55), rgba(10,6,20,.3) 55%, transparent);opacity:0;pointer-events:none;z-index:2;transition:opacity .9s}
#gate{position:fixed;inset:0;background:#05070d;display:flex;flex-direction:column;gap:26px;align-items:center;justify-content:center;z-index:100;transition:opacity 1.4s}
#gate h1{font-size:34px;letter-spacing:12px;font-weight:normal;color:#ece4d4}
#gate .zh{color:var(--dim);letter-spacing:8px}
#gate button{background:none;border:1px solid var(--warm);color:var(--warm);padding:13px 36px;font-family:Georgia,serif;font-size:15px;letter-spacing:3px;border-radius:30px}
#gate label{font-size:12px;color:var(--dim)}
.choice{position:relative;z-index:5;display:flex;flex-direction:column;gap:18px;width:84%;max-width:340px}
.choice button{background:rgba(5,7,13,.72);border:1px solid var(--frost);color:var(--ink);padding:17px;font-family:Georgia,serif;font-size:16px;border-radius:4px;letter-spacing:1px;transition:all .3s}
.choice button:active{background:rgba(156,199,240,.25)}
.choice .q{text-align:center;color:var(--dim);font-style:italic;margin-bottom:6px}
#hud{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--frost),var(--warm));width:0;z-index:90}
.endbtns{display:flex;gap:14px;justify-content:center;margin-top:30px;flex-wrap:wrap}
.endbtns button{background:none;border:1px solid var(--dim);color:var(--dim);padding:10px 18px;border-radius:24px;font-family:Georgia,serif;font-size:13px}
.breathbtn{background:none;border:1px solid var(--warm);color:var(--warm);padding:16px 40px;border-radius:34px;font-family:Georgia,serif;font-size:17px;letter-spacing:3px;margin-top:26px;animation:glowyw 3.2s ease-in-out infinite}
#vobadge{position:fixed;bottom:10px;right:12px;font-size:10px;color:var(--dim);z-index:90;letter-spacing:1px;opacity:.7}
</style>
</head>
<body>
<div id="hud"></div>
<div id="flash"></div>
<div id="coldveil"></div>
<div id="darkveil"></div>
<div id="vobadge"></div>

const BEATS = [

   The daughter of Turan was a princess of ice.<br><br>The son of Turan was a boy who was loved.<br><br><em>This is his beginning.</em>`},
 {art:'coldcity', mood:'lull', sting:'wood', html:`He was born in the cold month,<br>in a city of a thousand courts<br>and ten thousand lanterns,<br><br>to a woman who had never seen<br>a single one of them.`},
 {art:'cradle', mood:'lull', voice:'elisabeth', vo:'ch1_03_elisabeth',
  line:`There. There's my talker.`,
  html:`Elisabeth could not see her son, so she learned<br>him another way: the shape of his head under<br>her palm, the pitch of his first cry — which was<br>not like other infants' crying at all,<br>but already reaching for a word.<br><br>
  <span class="warmv glow-w">"There. There's my talker."</span><br><br>She named him before he could answer to it.<br><b>Turanpor.</b>`},
 {art:'opera', mood:'opera', html:`She had carried that name for years.<br><br>
  One autumn, traveling players — the <b>Covenant<br>Players</b> — brought an opera about a frozen princess:<br><em>Turandot</em>, the daughter of Turan.<br><br>
  A man from the far North stood in the wings and<br>read the prince's part aloud, line by line, into the<br>dark, for the blind woman who could not follow<br>the page. He read as though he believed it.<br><br><em>He was gone before the first snow.</em>`},
 {art:'namebeat', mood:'opera', html:`Elisabeth kept two things from that season.<br><br>One was the boy.<br><br>
  The other was the name, turned around —<br>not the daughter of Turan but the son.<br><br><span class="aria glow">Turanpor.</span><br><br>
  He would carry his father in the very sound<br>of his own name, and not understand it for years.`},
 {art:'lawcourt', mood:'dark', html:`It was a hard world to be born small in.<br><br>
  The courts of that city had old and cold appetites,<br>and ways of taking from certain children the very<br>thing that would have made grown men of them —<br><br>
  and they wrote it into their law and called it<br><em>honor</em>, so that no one would ever have to<br>call it what it was.`},
 {art:'mend', mood:'mend', flash:true, html:`That is the wound beneath this whole story.<br><br>
  But this is a story that means to <b>mend</b>,<br>and so it will not linger on the taking.<br><br>
  It will tell you instead what his mother did,<br>which was the opposite of taking.<br><br><span class="warmv glow-w">She gave him language.</span>`},
 {art:'language', mood:'lull', html:`She could not show him the world, so she taught<br>him to make it with his mouth.<br><br>
  She taught him to read by having him read <em>aloud</em> —<br>every evening, his small clear voice carrying the<br>page into her darkness — so he grew up believing<br>reading was something you did <em>for</em> someone.<br><br><em>A thing you poured out. Not a thing you kept.</em>`},
 {art:'cradle', mood:'lull', voice:'elisabeth', vo:'ch1_09_elisabeth',

  He heard her.<br>He spent his whole childhood hearing her.`},
 {art:'playhouse', mood:'opera', choice:{

  Twelve years old, and the playhouse said he had<br>the clearest treble heard in twenty years —<br><br>a voice the world's cruelty had somehow failed<br>to make ugly, because his mother had gotten to it<br>first, and made it lovely instead.`},
 {art:'playhouse', mood:'opera', branch:'ghost', voice:'turanpor', vo:'ch1_11_turanpor_ghost',

 {art:'herbs', mood:'herb', voice:'baizhi', vo:'ch1_12_baizhi',

 {art:'coldcity', mood:'stage', html:`So when the <b>Double Ninth</b> came around the year<br>he turned twelve, and the playhouse mounted<br><em>Turandot</em> for the festival,<br><br>there was never any question<br>who would sing the princess.`},

/* ============ BUILD DOM ============ */
const story=document.getElementById('story');
let route = localStorage.getItem('ss_ch1_part') || null;
function build(){
 story.innerHTML='';
 BEATS.forEach((b,i)=>{
  if(b.branch && b.branch!==route) return;
  const s=document.createElement('section'); s.dataset.mood=b.mood; s.dataset.i=i;
  const bg=document.createElement('div'); bg.className='bg'; bg.appendChild(svgEl(G[b.art]())); s.appendChild(bg);
  if(b.choice){
   const c=document.createElement('div'); c.className='choice';
   c.innerHTML=`<div class="q">${b.choice.q}</div>`;
   [b.choice.a,b.choice.b,b.choice.c].filter(Boolean).forEach(opt=>{
    const btn=document.createElement('button'); btn.textContent=opt.t;
    btn.onclick=()=>{ route=opt.flag; localStorage.setItem('ss_ch1_part',route); sting('choice'); flash(.5); build();
      setTimeout(()=>{ document.querySelector(`section[data-i="${i}"]`)?.scrollIntoView(); window.scrollBy(0, innerHeight*0.9); },60); };
    c.appendChild(btn);
   });
   s.appendChild(c);
  } else {
   const t=document.createElement('div'); t.className='txt'; t.innerHTML=b.html; s.appendChild(t);
  }
  story.appendChild(s);
 });
 const note=document.getElementById('routeNote');
 if(note) note.textContent = route ? ({villain:'the sky remembers: silk over a knife.',maiden:'the sky remembers: he would not say it twice.',ghost:'the sky remembers: one debt, unpaid, beneath the same sky.'})[route] : '';
 observeAll();
}

/* ============ SCROLL FX ============ */
let observer;
function observeAll(){
 observer && observer.disconnect();
 observer=new IntersectionObserver(es=>{
  es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('lit'); onEnter(e.target); } });
 },{threshold:.45});
 document.querySelectorAll('section').forEach(s=>observer.observe(s));
}
function onEnter(s){
 const m=s.dataset.mood;
 document.getElementById('coldveil').style.opacity=(m==='frost')?0.85:0;
 document.getElementById('darkveil').style.opacity=(m==='dark')?0.8:0;
 music.mood(m);
 const b=BEATS[+s.dataset.i]||{};
 if(b.sting) sting(b.sting);
 if(b.flash) flash(.85);
 if(b.voice && !b._spoken){ b._spoken=true; setTimeout(()=>voice.say(b),700); }
}
function flash(op){ const f=document.getElementById('flash'); f.style.transition='none'; f.style.opacity=op;
 requestAnimationFrame(()=>{ f.style.transition='opacity 1.2s'; f.style.opacity=0; }); }
function takeBreath(btn){
 btn.style.opacity=0; btn.disabled=true;
 music.swell(); flash(.95);
 setTimeout(()=>{ document.querySelectorAll('section')[ [...document.querySelectorAll('section')].indexOf(btn.closest('section'))+1 ]?.scrollIntoView({behavior:'smooth'}); },900);
}
// parallax
let ticking=false;
addEventListener('scroll',()=>{
 if(ticking) return; ticking=true;
 requestAnimationFrame(()=>{
  const h=document.body.scrollHeight-innerHeight;
  document.getElementById('hud').style.width=(scrollY/h*100)+'%';
  document.querySelectorAll('section').forEach(s=>{
   const r=s.getBoundingClientRect();
   if(r.bottom<0||r.top>innerHeight) return;
   const p=(r.top)/innerHeight;
   s.querySelector('.bg').style.transform=`translateY(${p*60}px) scale(1.06)`;
  });
  ticking=false;
 });
},{passive:true});

/* ============ VOICE LAYER ============ */
/* Tier 1: VibeVoice audio files in webtoon/vo/ — drop in <stem>.wav or .mp3 and they play automatically.
   Tier 2: synthesized character murmurs (speech-contour blips, one timbre per speaker). */
const VOICES={
 elisabeth:{base:294, type:'sine',    rate:175, fall:0.94, vib:5.5, vol:.16},  // warm, low, unhurried
 baizhi:   {base:392, type:'square',  rate:110, fall:0.985,vib:0,   vol:.07},  // brisk, clipped
 turanpor: {base:523, type:'triangle',rate:150, fall:0.97, vib:6.5, vol:.13}   // clear treble
};
const voice={
 say(b){
  if(document.getElementById('voiceless')?.checked) return;
  const stem=b.vo;
  if(stem){
   const tryPlay=(ext,next)=>{ const a=new Audio('vo/'+stem+ext); a.volume=.9;
     a.onerror=next; a.oncanplaythrough=()=>{ a.play().catch(()=>this.murmur(b)); badge('voice: '+stem+ext); };
     a.load(); };
   tryPlay('.wav',()=>tryPlay('.mp3',()=>{ this.murmur(b); }));
  } else this.murmur(b);
 },
 murmur(b){
  if(!music.ctx) return;
  const v=VOICES[b.voice]; if(!v||!b.line) return;
  badge('voice murmur: '+b.voice);
  const words=b.line.replace(/[^\w\s'?]/g,'').split(/\s+/).filter(Boolean);
  const c=music.ctx; let t=c.currentTime+.05;
  const syl=w=>Math.max(1,Math.ceil(w.length/3));
  const qEnd=b.line.trim().endsWith('?');
  let f=v.base;
  words.forEach((w,wi)=>{
   const n=syl(w);
   for(let s=0;s<n;s++){
    const o=c.createOscillator(),g=c.createGain();
    o.type=v.type;
    // sentence contour: drift down, rise at the end for questions
    const pos=wi/words.length;
    let freq=f*(1+((w.charCodeAt(s%w.length)%7)-3)*0.022);
    if(qEnd&&pos>0.8) freq*=1.18;
    o.frequency.setValueAtTime(freq,t);
    o.frequency.exponentialRampToValueAtTime(freq*0.96,t+v.rate/1000*.8);
    if(v.vib){ const vb=c.createOscillator(),vg=c.createGain(); vb.frequency.value=v.vib; vg.gain.value=3;
     vb.connect(vg); vg.connect(o.frequency); vb.start(t); vb.stop(t+v.rate/1000); }
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v.vol,t+0.018);
    g.gain.exponentialRampToValueAtTime(.0001,t+v.rate/1000*.95);
    o.connect(g); g.connect(music.voicebus);
    o.start(t); o.stop(t+v.rate/1000);
    t+=v.rate/1000;
   }
   f*=v.fall===0.985?1:(v.fall+(wi%3)*0.012);
   t+=(w.endsWith(',')?0.22:0.05)+(v.rate/1000)*0.3;
  });
 }
};
let badgeT=null;
function badge(s){ const el=document.getElementById('vobadge'); el.textContent=s;
 clearTimeout(badgeT); badgeT=setTimeout(()=>el.textContent='',2600); }

/* ============ MUSIC (synthesized — nothing copyrighted) ============ */
const music={ctx:null,master:null,voicebus:null,cur:'',
 start(){ this.ctx=new (window.AudioContext||window.webkitAudioContext)();
  this.master=this.ctx.createGain(); this.master.gain.value=.5; this.master.connect(this.ctx.destination);
  // gentle space: feedback delay shared by plucks + voice
  this.delay=this.ctx.createDelay(); this.delay.delayTime.value=.31;
  this.fb=this.ctx.createGain(); this.fb.gain.value=.32;
  this.wet=this.ctx.createGain(); this.wet.gain.value=.25;
  this.delay.connect(this.fb); this.fb.connect(this.delay); this.delay.connect(this.wet); this.wet.connect(this.master);
  this.voicebus=this.ctx.createGain(); this.voicebus.gain.value=1; this.voicebus.connect(this.master); this.voicebus.connect(this.delay);
  this.drone(); this.pluckLoop(); },
 drone(){ const c=this.ctx; this.dg=c.createGain(); this.dg.gain.value=.05; this.dg.connect(this.master);
  this.dOsc=[55,55.7,110.3].map(f=>{ const o=c.createOscillator(); o.type='sine'; o.frequency.value=f; o.connect(this.dg); o.start(); return o; }); },
 // pentatonic palettes per mood — konghou-flavored
 scaleFor(m){ return (m==='dark')?[220,246.9,293.7,329.6,392]:
   (m==='frost'||m==='hush')?[261.6,311.1,349.2,415.3,523.3]:
   (m==='herb')?[233,261.6,311.1,392,466.2]:
   (m==='finale'||m==='end')?[261.6,329.6,392,523.3,659.3]:
   [233,261.6,311.1,349.2,415.3]; },
 pluck(f,vol){ const c=this.ctx,t=c.currentTime;
  // doubled detuned strings = konghou shimmer
  [0,1.004].forEach(d=>{ const o=c.createOscillator(),g=c.createGain();
   o.type='triangle'; o.frequency.setValueAtTime(f*d||f,t); o.frequency.exponentialRampToValueAtTime((f*d||f)*0.995,t+2);
   g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+2.4);
   o.connect(g); g.connect(this.master); g.connect(this.delay); o.start(t); o.stop(t+2.5); }); },
 pluckLoop(){ const step=()=>{ if(this.cur&&this.cur!=='still'){
    const sc=this.scaleFor(this.cur); this.pluck(sc[Math.floor(Math.random()*sc.length)]/(Math.random()<.3?2:1), .06); }
   const slow=(this.cur==='lull'||this.cur==='end'||this.cur==='frost'||this.cur==='hush');
   setTimeout(step, (slow?1700:950)+Math.random()*900); }; step(); },
 mood(m){ if(!this.ctx||m===this.cur) return; this.cur=m;
  const t=this.ctx.currentTime;
  const dark=(m==='dark');
  const bright=(m==='finale'||m==='end');
  this.dOsc.forEach((o,i)=>o.frequency.linearRampToValueAtTime(
    dark?[41.2,41.7,82.9][i]:bright?[65.4,65.9,131.2][i]:[55,55.7,110.3][i], t+2));
  this.dg.gain.linearRampToValueAtTime(dark?.09:bright?.07:.05,t+2); },
 swell(){ if(!this.ctx) return; const c=this.ctx,t=c.currentTime;
  this.dg.gain.linearRampToValueAtTime(.16,t+1.2); this.dg.gain.linearRampToValueAtTime(.06,t+4);
  [261.6,329.6,392,523.3,659.3,784].forEach((f,i)=>setTimeout(()=>this.pluck(f,.16),i*170)); }
};
function sting(kind){ if(!music.ctx) return; const c=music.ctx,t=c.currentTime;
 if(kind==='wood'){ const o=c.createOscillator(),g=c.createGain(); o.type='square'; o.frequency.value=1100;
  g.gain.setValueAtTime(.35,t); g.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.connect(g); g.connect(music.master); o.start(t); o.stop(t+.1); }
 if(kind==='choice'){ [392,523.3,659.3].forEach((f,i)=>setTimeout(()=>music.pluck(f,.18),i*140)); }
}

/* ============ GATE ============ */
document.getElementById('begin').onclick=()=>{
 music.start();
 const g=document.getElementById('gate'); g.style.opacity=0;
 setTimeout(()=>g.remove(),1500);
 sting('wood');
};
function restart(){ scrollTo({top:0}); }
build();
</script>
