<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SAME SKY — Chapter 1: The Talker</title>
<style>
:root{--ink:#e8edf6;--dim:#8d97ad;--warm:#e8b35a;--frost:#9cc7f0;--herb:#b8e6c8;--bg:#05070d;
 --plate:rgba(7,10,18,.92);--plate-border:rgba(141,151,173,.35);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:var(--bg);color:var(--ink);font-family:Georgia,serif;overflow-x:hidden}
#strip{width:100%;max-width:520px;margin:0 auto;position:relative}
.panel{position:relative;width:100%}
.panel svg{display:block;width:100%;height:auto}
/* ---- text plates: always on solid scrim, WCAG AA+ contrast ---- */
.plate{position:absolute;max-width:78%;padding:13px 16px;background:var(--plate);
 border:1px solid var(--plate-border);border-radius:3px;
 font-size:17px;line-height:1.62;text-shadow:none;z-index:5}
.plate.cap{border-left:3px solid var(--dim)}
.plate.eli{border-left:3px solid var(--warm);color:#ffe6bd;font-style:italic}
.plate.eli::before{content:"ELISABETH";display:block;font-style:normal;font-size:10.5px;letter-spacing:2px;color:var(--warm);margin-bottom:5px}
.plate.bz{border-left:3px solid var(--herb);color:#d8f3e2;font-style:italic}
.plate.bz::before{content:"BAIZHI";display:block;font-style:normal;font-size:10.5px;letter-spacing:2px;color:var(--herb);margin-bottom:5px}
.plate.tp{border-left:3px solid var(--frost);color:#dcebfb;font-style:italic}
.plate.tp::before{content:"TURANPOR";display:block;font-style:normal;font-size:10.5px;letter-spacing:2px;color:var(--frost);margin-bottom:5px}
.plate.big{font-size:20px;line-height:1.7}
.plate b{color:#fff}
.plate .zh{color:var(--dim);letter-spacing:4px;font-size:13px}
.gut{width:100%} /* gutters set inline as padding-bottom % of width */
.choice-wrap{position:absolute;left:8%;right:8%;z-index:6;display:flex;flex-direction:column;gap:14px}
.choice-wrap .q{background:var(--plate);border:1px solid var(--plate-border);border-radius:3px;padding:12px 15px;color:var(--dim);font-style:italic;font-size:15.5px;line-height:1.55;text-align:center}
.choice-wrap button{background:var(--plate);border:1px solid var(--frost);color:var(--ink);padding:15px;font-family:Georgia,serif;font-size:16px;border-radius:3px;letter-spacing:.5px;cursor:pointer;text-align:left;line-height:1.5}
.choice-wrap button:focus-visible{outline:3px solid var(--warm);outline-offset:2px}
.choice-wrap button:active{background:rgba(156,199,240,.22)}
.breathbtn{position:absolute;left:50%;transform:translateX(-50%);z-index:6;background:var(--plate);border:1.5px solid var(--warm);color:#ffd9a0;
 padding:16px 38px;border-radius:34px;font-family:Georgia,serif;font-size:17px;letter-spacing:3px;cursor:pointer;animation:glowyw 3.2s ease-in-out infinite}
.breathbtn:focus-visible{outline:3px solid var(--frost);outline-offset:2px}
@keyframes glowyw{0%,100%{box-shadow:0 0 10px rgba(232,179,90,.2)}50%{box-shadow:0 0 30px rgba(232,179,90,.75)}}
@media (prefers-reduced-motion: reduce){.breathbtn{animation:none}}
#gate{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;gap:24px;align-items:center;justify-content:center;z-index:100;transition:opacity 1.2s;padding:20px;text-align:center}
#gate h1{font-size:32px;letter-spacing:11px;font-weight:normal;color:#ece4d4}
#gate .zh{color:var(--dim);letter-spacing:8px}
#gate .sub{font-size:13px;color:var(--dim);letter-spacing:3px}
#gate button{background:none;border:1px solid var(--warm);color:var(--warm);padding:13px 36px;font-family:Georgia,serif;font-size:15px;letter-spacing:3px;border-radius:30px;cursor:pointer}
#gate label{font-size:13px;color:var(--dim)}
#hud{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--frost),var(--warm));width:0;z-index:90}
#vobadge{position:fixed;bottom:10px;right:12px;font-size:10px;color:var(--dim);z-index:90;letter-spacing:1px;opacity:.75}
.endbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:absolute;left:8%;right:8%;z-index:6}
.endbtns a,.endbtns button{background:var(--plate);border:1px solid var(--dim);color:var(--ink);padding:11px 18px;border-radius:24px;font-family:Georgia,serif;font-size:14px;text-decoration:none;cursor:pointer}
</style>
</head>
<body>
<div id="hud"></div>
<div id="vobadge"></div>
<div id="gate">
 <h1>S A M E&#8201;&#8201;S K Y</h1>
 <div class="zh">同 一 片 天</div>
 <div class="sub">CHAPTER ONE — THE TALKER</div>
 <button id="begin">A T T E N D</button>
 <label><input type="checkbox" id="voiceless"> quiet mode (no voices)</label>
 <div class="sub">headphones · scroll slowly</div>
</div>
<main id="strip" aria-label="SAME SKY Chapter One, a scrolling comic"></main>

 observer&&observer.disconnect();

}

}

  if(b.vo){const t=(ext,next)=>{const a=new Audio('vo/'+b.vo+ext);a.volume=.92;
    a.onerror=next;a.oncanplaythrough=()=>{a.play().catch(()=>this.murmur(b));badge('voice: '+b.vo)};a.load();};
   t('.mp3',()=>t('.wav',()=>this.murmur(b)));}
  else this.murmur(b);},
 murmur(b){if(!music.ctx)return;const v=VOICES[b.voice];if(!v||!b.line)return;
  badge('murmur: '+b.voice);
  const words=b.line.replace(/[^\w\s'?]/g,'').split(/\s+/).filter(Boolean);
  const c=music.ctx;let t=c.currentTime+.05,f=v.base;
  const qEnd=b.line.trim().endsWith('?');
  words.forEach((w,wi)=>{const n=Math.max(1,Math.ceil(w.length/3));
   for(let s=0;s<n;s++){const o=c.createOscillator(),g=c.createGain();o.type=v.type;
    let fr=f*(1+((w.charCodeAt(s%w.length)%7)-3)*.022);
    if(qEnd&&wi/words.length>.8)fr*=1.18;
    o.frequency.setValueAtTime(fr,t);o.frequency.exponentialRampToValueAtTime(fr*.96,t+v.rate/1000*.8);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v.vol,t+.018);
    g.gain.exponentialRampToValueAtTime(.0001,t+v.rate/1000*.95);
    o.connect(g);g.connect(music.voicebus);o.start(t);o.stop(t+v.rate/1000);t+=v.rate/1000;}
   t+=.05+(v.rate/1000)*.3;});}
};

  this.loop();},
 scaleFor(m){return m==='dark'?[220,246.9,293.7,329.6,392]:
  (m==='frost'||m==='hush')?[261.6,311.1,349.2,415.3,523.3]:
  m==='herb'?[233,261.6,311.1,392,466.2]:
  (m==='finale'||m==='end')?[261.6,329.6,392,523.3,659.3]:[233,261.6,311.1,349.2,415.3];},
 pluck(f,vol){const c=this.ctx,t=c.currentTime;
  [1,1.004].forEach(d=>{const o=c.createOscillator(),g=c.createGain();
   o.type='triangle';o.frequency.setValueAtTime(f*d,t);o.frequency.exponentialRampToValueAtTime(f*d*.995,t+2);
   g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+2.4);
   o.connect(g);g.connect(this.master);g.connect(this.delay);o.start(t);o.stop(t+2.5);});},
 loop(){const step=()=>{if(this.cur&&this.cur!=='still'){
   const sc=this.scaleFor(this.cur);this.pluck(sc[Math.floor(Math.random()*sc.length)]/(Math.random()<.3?2:1),.06);}
  const slow=['lull','end','frost','hush'].includes(this.cur);
  setTimeout(step,(slow?1700:950)+Math.random()*900);};step();},
 mood(m){if(!this.ctx||m===this.cur)return;this.cur=m;const t=this.ctx.currentTime;
  const dark=m==='dark',bright=(m==='finale'||m==='end');
  this.dOsc.forEach((o,i)=>o.frequency.linearRampToValueAtTime(dark?[41.2,41.7,82.9][i]:bright?[65.4,65.9,131.2][i]:[55,55.7,110.3][i],t+2));
  this.dg.gain.linearRampToValueAtTime(dark?.09:bright?.07:.05,t+2);},
 swell(){if(!this.ctx)return;const t=this.ctx.currentTime;
  this.dg.gain.linearRampToValueAtTime(.16,t+1.2);this.dg.gain.linearRampToValueAtTime(.06,t+4);
  [261.6,329.6,392,523.3,659.3,784].forEach((f,i)=>setTimeout(()=>this.pluck(f,.16),i*170));}
};
function sting(k){if(!music.ctx)return;const c=music.ctx,t=c.currentTime;
 if(k==='wood'){const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=1100;
  g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.connect(g);g.connect(music.master);o.start(t);o.stop(t+.1);}
 if(k==='choice')[392,523.3,659.3].forEach((f,i)=>setTimeout(()=>music.pluck(f,.18),i*140));}

/* ================= GATE ================= */
document.getElementById('begin').onclick=()=>{
 music.start();const g=document.getElementById('gate');g.style.opacity=0;
 setTimeout(()=>g.remove(),1300);sting('wood');};
build();
