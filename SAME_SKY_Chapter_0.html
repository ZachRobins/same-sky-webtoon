<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SAME SKY — Chapter 0: Lou Ling's Prelude</title>
<style>
:root{--ink:#dfe5f0;--dim:#7e88a0;--warm:#e8b35a;--frost:#9cc7f0;--blood:#a31621;}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:#05070d;color:var(--ink);font-family:Georgia,serif;overflow-x:hidden}
section{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:absolute;inset:-12% -6%;z-index:0;will-change:transform}
.bg svg{width:100%;height:100%}
.layer{position:absolute;inset:-12% -6%;z-index:1;will-change:transform}
.txt{position:relative;z-index:5;max-width:340px;padding:28px;text-align:center;font-size:17.5px;line-height:1.85;
 opacity:0;transform:translateY(36px);transition:opacity 1.1s ease,transform 1.1s ease;text-shadow:0 2px 18px rgba(0,0,0,.9)}
section.lit .txt{opacity:1;transform:none}
.aria{font-style:italic;color:var(--frost);letter-spacing:1px}
.red .aria{color:#ff9a8a}
.small{font-size:13px;color:var(--dim)}
.title-h{font-size:30px;letter-spacing:9px;color:#ece4d4;font-weight:normal}
.glow{animation:glowp 3.2s ease-in-out infinite}
@keyframes glowp{0%,100%{text-shadow:0 0 14px rgba(156,199,240,.25)}50%{text-shadow:0 0 34px rgba(156,199,240,.85)}}
.glow-w{animation:glowyw 3.2s ease-in-out infinite}
@keyframes glowyw{0%,100%{text-shadow:0 0 14px rgba(232,179,90,.25)}50%{text-shadow:0 0 34px rgba(232,179,90,.9)}}
.shake{animation:shk .45s linear}
@keyframes shk{0%,100%{transform:translate(0)}20%{transform:translate(-9px,4px)}40%{transform:translate(8px,-6px)}60%{transform:translate(-6px,-4px)}80%{transform:translate(7px,5px)}}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50}
#redveil{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 110%, rgba(163,22,33,.55), rgba(80,4,10,.25) 55%, transparent);opacity:0;pointer-events:none;z-index:2;transition:opacity .9s}
#scare{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:60}
#scare svg{width:130vw;height:130vh}
#gate{position:fixed;inset:0;background:#05070d;display:flex;flex-direction:column;gap:26px;align-items:center;justify-content:center;z-index:100;transition:opacity 1.4s}
#gate h1{font-size:34px;letter-spacing:12px;font-weight:normal;color:#ece4d4}
#gate .zh{color:var(--dim);letter-spacing:8px}
#gate button{background:none;border:1px solid var(--warm);color:var(--warm);padding:13px 36px;font-family:Georgia,serif;font-size:15px;letter-spacing:3px;border-radius:30px}
#gate label{font-size:12px;color:var(--dim)}
.choice{position:relative;z-index:5;display:flex;flex-direction:column;gap:18px;width:84%;max-width:340px}
.choice button{background:rgba(5,7,13,.72);border:1px solid var(--frost);color:var(--ink);padding:17px;font-family:Georgia,serif;font-size:16px;border-radius:4px;letter-spacing:1px;transition:all .3s}
.choice button:active{background:rgba(156,199,240,.25)}
.choice .q{text-align:center;color:var(--dim);font-style:italic;margin-bottom:6px}
#hud{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--frost),var(--warm));width:0;z-index:90}
.hidden{display:none!important}
.endbtns{display:flex;gap:14px;justify-content:center;margin-top:30px}
.endbtns button{background:none;border:1px solid var(--dim);color:var(--dim);padding:10px 18px;border-radius:24px;font-family:Georgia,serif;font-size:13px}
.charline{display:block;overflow:hidden;white-space:nowrap}
</style>
</head>
<body>
<div id="hud"></div>
<div id="flash"></div>
<div id="redveil"></div>
<div id="scare"></div>

<div id="gate">
 <h1>S A M E&#8201;&#8201;S K Y</h1>
 <div class="zh">同 一 片 天</div>
 <div class="small" style="letter-spacing:3px">CHAPTER ZERO — LOU LING'S PRELUDE</div>
 <button id="begin">A T T E N D</button>
 <label><input type="checkbox" id="safe"> gentle mode (no sudden scares)</label>
 <div class="small">headphones recommended · scroll slowly</div>
</div>

<main id="story"></main>

<script>
/* ============ SCENE PAINTERS (procedural art, SAME SKY style) ============ */
const NS='http://www.w3.org/2000/svg';
function svgEl(html){const d=document.createElement('div');d.innerHTML=`<svg xmlns="${NS}" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">${html}</svg>`;return d.firstChild}
const G={
 theatre:()=>`<defs><radialGradient id="lamp" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#2a2536"/><stop offset="100%" stop-color="#05070d"/></radialGradient></defs>

  <rect width="400" height="800" fill="url(#moon)"/>
  <circle cx="200" cy="190" r="55" fill="#dceaf7" opacity=".9"/><circle cx="200" cy="190" r="95" fill="#9cc7f0" opacity=".12"/>
  <path d="M150 560 Q200 430 250 560 L250 800 L150 800 Z" fill="#070a14"/>

  ${Array.from({length:9},(_,i)=>`<path d="M${30+i*42} -40 Q${70+i*42} ${330+(i%4)*60} ${10+i*42} 840" stroke="#a31621" stroke-width="${7+(i%3)*4}" fill="none" opacity="${0.25+(i%4)*0.14}"/>`).join('')}
  <circle cx="200" cy="400" r="60" fill="#0c0a14"/><circle cx="200" cy="400" r="60" fill="#a31621" opacity=".12"/>`,
 descent:()=>`<defs><linearGradient id="dn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#140508"/><stop offset="100%" stop-color="#3d060e"/></linearGradient></defs>
  <rect width="400" height="800" fill="url(#dn)"/>
  ${Array.from({length:14},(_,i)=>`<path d="M0 ${60+i*56} L400 ${95+i*56}" stroke="#000" stroke-width="${20+(i%3)*9}" opacity=".5"/>`).join('')}
  <path d="M185 0 L185 800 M215 0 L215 800" stroke="#71101c" stroke-width="3" opacity=".7"/>
  <circle cx="200" cy="620" r="11" fill="#05070d"/>`,
 pool:()=>`<rect width="400" height="800" fill="#2b040b"/>
  <ellipse cx="200" cy="600" rx="260" ry="150" fill="#5e0a16"/>
  <ellipse cx="200" cy="600" rx="260" ry="150" fill="#a31621" opacity=".35"/>
  ${Array.from({length:12},(_,i)=>`<ellipse cx="${40+i*32}" cy="${560+(i%5)*38}" rx="${9+(i%3)*5}" ry="3.5" fill="#d44" opacity=".25"/>`).join('')}`,
 harrow:()=>`<rect width="400" height="800" fill="#1d0410"/>
  <circle cx="200" cy="330" r="120" fill="none" stroke="#ffd9a0" stroke-width="1.5" opacity=".8"/>
  <circle cx="200" cy="330" r="160" fill="none" stroke="#ffd9a0" stroke-width=".7" opacity=".4"/>
  <circle cx="200" cy="330" r="200" fill="none" stroke="#ffd9a0" stroke-width=".4" opacity=".2"/>
  <path d="M186 280 Q200 250 214 280 L209 392 L191 392 Z" fill="#0a0510"/>
  <circle cx="200" cy="262" r="12" fill="#0a0510"/>
  ${Array.from({length:18},(_,i)=>`<circle cx="${(i*71)%400}" cy="${(i*131)%760}" r="1.3" fill="#ffd9a0" opacity=".6"/>`).join('')}`,
 refuge:()=>`<defs><linearGradient id="rf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a1322"/><stop offset="100%" stop-color="#15304a"/></linearGradient></defs>
  <rect width="400" height="800" fill="url(#rf)"/>
  ${Array.from({length:11},(_,i)=>`<g><rect x="${28+i*34}" y="${300+(i%4)*85}" width="13" height="19" rx="4" fill="#ffba66" opacity=".85"/><circle cx="${34+i*34}" cy="${309+(i%4)*85}" r="17" fill="#ffba66" opacity=".15"/></g>`).join('')}
  <path d="M0 720 Q110 660 200 700 T400 690 L400 800 L0 800 Z" fill="#0a1626"/>`,
 sacrifice:()=>`<defs><radialGradient id="sun" cx="50%" cy="42%" r="55%"><stop offset="0%" stop-color="#fff4cf"/><stop offset="28%" stop-color="#e8b35a"/><stop offset="100%" stop-color="#0a0d18"/></radialGradient></defs>
  <rect width="400" height="800" fill="url(#sun)"/>
  <path d="M186 560 Q200 528 214 560 L208 690 L192 690 Z" fill="#05070d"/>
  <circle cx="200" cy="540" r="13" fill="#05070d"/>
  <path d="M155 430 Q200 380 245 430 Q230 470 200 462 Q170 470 155 430 Z" fill="none" stroke="#05070d" stroke-width="4"/>`,
 ice:()=>`<defs><linearGradient id="icg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0b1626"/><stop offset="100%" stop-color="#1c3852"/></linearGradient></defs>
  <rect width="400" height="800" fill="url(#icg)"/>
  <path d="M0 560 L80 510 L160 555 L260 500 L340 545 L400 515 L400 800 L0 800 Z" fill="#dceaf7" opacity=".88"/>
  <path d="M0 560 L80 510 L160 555 L260 500 L340 545 L400 515" fill="none" stroke="#fff" stroke-width="1.5" opacity=".6"/>
  <rect x="178" y="585" width="44" height="26" rx="9" fill="#3b2c20"/>
  <path d="M178 592 Q200 575 222 592" stroke="#3b2c20" stroke-width="4" fill="none"/>
  <circle cx="200" cy="596" r="6" fill="#f2d8c2"/>
  ${Array.from({length:30},(_,i)=>`<circle cx="${(i*67)%400}" cy="${(i*119)%520}" r="${(i%4)/2+0.5}" fill="#e6f0fb" opacity=".8"/>`).join('')}`,
 harp:()=>`<rect width="400" height="800" fill="#070b16"/>
  <path d="M140 600 Q120 380 220 300 Q300 250 290 360 L282 600 Z" fill="none" stroke="#e8b35a" stroke-width="5" opacity=".95"/>
  ${Array.from({length:9},(_,i)=>`<line x1="${158+i*13}" y1="${590}" x2="${198+i*9}" y2="${330+i*8}" stroke="#ffe9b0" stroke-width="1" opacity=".75"/>`).join('')}
  <circle cx="220" cy="300" r="46" fill="#e8b35a" opacity=".08"/>
  ${Array.from({length:24},(_,i)=>`<circle cx="${(i*83)%400}" cy="${(i*139)%780}" r="1.1" fill="#ffe9b0" opacity=".5"/>`).join('')}`,
 lanterns:()=>`<defs><linearGradient id="ln" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a1322"/><stop offset="60%" stop-color="#1d2238"/><stop offset="100%" stop-color="#3a2a28"/></linearGradient></defs>
  <rect width="400" height="800" fill="url(#ln)"/>
  ${Array.from({length:16},(_,i)=>`<g><rect x="${15+(i*47)%370}" y="${90+(i*73)%330}" width="15" height="21" rx="5" fill="#ff9d4d" opacity=".9"/><circle cx="${22+(i*47)%370}" cy="${100+(i*73)%330}" r="20" fill="#ff9d4d" opacity=".13"/></g>`).join('')}
  <path d="M0 640 L60 600 L120 645 L200 590 L280 640 L350 605 L400 640 L400 800 L0 800 Z" fill="#0c0f1c"/>
  <path d="M168 690 Q186 640 204 690 L200 770 L172 770 Z" fill="#070a12"/>
  <circle cx="186" cy="630" r="11" fill="#070a12"/>
  <path d="M214 700 Q222 660 230 700 L228 760 L216 760 Z" fill="#070a12"/>
  <circle cx="222" cy="652" r="7" fill="#070a12"/>`
};
const SCARE = `<svg xmlns="${NS}" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice"><rect width="400" height="800" fill="#180204"/>
 ${Array.from({length:34},(_,i)=>{const x=(i*37)%400, y=720-((i*97)%560);
  return `<path d="M${x} 800 L${x} ${y} M${x-7} ${y+26} L${x} ${y} L${x+8} ${y+30} M${x-4} ${y+12} L${x} ${y}" stroke="#d8a4a4" stroke-width="4" fill="none"/>`;}).join('')}
 <circle cx="200" cy="320" r="46" fill="#2b040b"/><circle cx="184" cy="310" r="6" fill="#ffd9a0"/><circle cx="216" cy="310" r="6" fill="#ffd9a0"/>
 <path d="M178 348 Q200 372 222 348" stroke="#ffd9a0" stroke-width="3" fill="none"/></svg>`;

/* ============ STORY ============ */
const BEATS = [
 {art:'theatre', mood:'still', html:`<span class="small" style="letter-spacing:4px">THE DESCENT, PLAYED NIGHTLY</span><br><br>
   The theatre is dark.<br>The living sit in the seats they paid for.<br><br>The dead sit in the seats they didn't.`},
 {art:'theatre', mood:'still', sting:'wood', shake:true, html:`<em>— the waking wood strikes —</em><br><br>
   One teller. One fan. One lamp.<br><br><span class="aria">"Attend. This happened, and is happening still."</span>`},
 {art:'aria', mood:'aria', html:`Before the boy, before the bride-price,<br>before the frost found its second heart —<br><br>there was a princess the world wronged so well<br>that the wrong outlived her by a thousand years.`},
 {art:'aria', mood:'aria', html:`<span class="aria glow">"In this palace, a cry was heard.<br>Today, you live again through me."</span><br><br>
   They wrote her as winter's cruelty.<br>They staged her a murderer of suitors.<br><br>Her name was <b>Lou Ling</b>.<br>The slander was the only part they kept.`},
 {art:'ribbons', mood:'red', html:`A wronged woman's grievance does not rot.<br>It pools.<br><br>
   Below the world there is a place where every<br>mother's spilled blood is made into a sea,<br>and the wronged are told to drown in their own.<br><br><b>The Blood Bowl Hell.</b>`},
 {art:'descent', mood:'descent', html:`She did not wait to be sentenced.<br><br>She walked down the red stair<br>with her harp on her back —<br><br>the <b>konghou</b>, the instrument the world had<br>already managed to lose once.`},
 {art:'pool', mood:'pool', scare:true, html:`The pool knew her name.<br><br>The pool knew everyone's name.<br><br><em>Do not look away. She didn't.</em>`},
 {art:'harrow', mood:'harrow', html:`She stood hip-deep in the grief of ten thousand<br>mothers and did the one thing no hell expects.<br><br>
   She sang to it.<br><br><span class="aria glow-w">The water-mill voice. The note that wears through stone.<br>Not louder than suffering — longer.</span>`},
 {art:'harrow', mood:'choice', choice:{
   q:'The hell is hers now. The grief looks up at her like a child. What does she do with it?',
   a:{t:'EMPTY IT — pour every soul out into the light', flag:'release'},
   b:{t:'CARRY IT — make the hell itself a refuge', flag:'refuge'}}},
 {art:'refuge', mood:'refuge', branch:'release', html:`She opened the floor of the world like a sleeve<br>and poured the sea out, soul by soul,<br>into whatever light would have them.<br><br>
   The hell stood empty. Clean. Quiet.<br><br><em>And she stood in the quiet alone,<br>and found she could not follow them up.</em>`},
 {art:'refuge', mood:'refuge', branch:'refuge', html:`She did not empty it. She <em>kept</em> it.<br><br>
   She hung lanterns in the dark of it. She taught the<br>grief to sit down, to eat, to say its own name.<br><br>
   The Blood Bowl became a refuge — the slander<br>turned inside-out like a glove.<br><br><em>Carry everything. Sever nothing.</em>`},
 {art:'sacrifice', mood:'sacrifice', flash:true, html:`Every inversion has a price, and the price is<br>always the truest thing you own.<br><br>
   Lou Ling held the <b>Supreme Yin</b> — the founding<br>cold, the throne of all winters.<br><br>She spent it.<br>All of it.<br>On them.`},
 {art:'ice', mood:'ice', html:`What was left of her fit in two gifts.<br><br>
   The first she pressed into a line of frost that<br>would sleep in the blood of her children's children —<br><br>
   <span class="aria glow">"the only inheritance that would know you<br>when it touched you."</span><br><br>The Frozen Heart.`},
 {art:'ice', mood:'ice', html:`The second gift was harder.<br><br>
   The mother who conquered hell could keep the<br>refuge, or keep her body, or keep her child.<br><br>Not all three. Not two.<br><br>
   She chose the way mothers choose.<br><em>The basket on the ice was warm for hours.</em>`},
 {art:'harp', mood:'harp', html:`The konghou vanished for centuries.<br><br>
   Instruments do that, when their player dies —<br>they go where the songs went.<br><br>
   But lost-and-returned is the konghou's whole nature.<br><br><em>It is already on its way back.</em>`},
 {art:'lanterns', mood:'end', html:`A thousand years downstream, in a city of a<br>thousand courts and ten thousand lanterns,<br>a blind woman holds her newborn son<br>and reads him with her thumbs.<br><br>
   The frost in his blood opens one eye.<br><br><span class="aria glow">"There's my talker,"</span> she says.<br><br>She names him <b>Turanpor</b>.`},
 {art:'lanterns', mood:'end', end:true, html:`<span class="title-h">S A M E&#8201;&#8201;S K Y</span><br>
   <span class="small">end of chapter zero</span><br><br>
   <span class="small" id="routeNote"></span>
   <div class="endbtns"><button onclick="restart()">⟲ again</button><button onclick="otherRoute()">⇄ other path</button></div>`}
];

/* ============ BUILD DOM ============ */
const story=document.getElementById('story');
let route = localStorage.getItem('ss_route') || null;
function build(){
 story.innerHTML='';
 BEATS.forEach((b,i)=>{
  if(b.branch && b.branch!==route) return;
  const s=document.createElement('section'); s.dataset.mood=b.mood; s.dataset.i=i;
  const bg=document.createElement('div'); bg.className='bg'; bg.appendChild(svgEl(G[b.art]())); s.appendChild(bg);
  if(b.choice){
   const c=document.createElement('div'); c.className='choice';
   c.innerHTML=`<div class="q">${b.choice.q}</div>`;
   [b.choice.a,b.choice.b].forEach(opt=>{
    const btn=document.createElement('button'); btn.textContent=opt.t;
    btn.onclick=()=>{ route=opt.flag; localStorage.setItem('ss_route',route); sting('choice'); flash(.5); build();
      setTimeout(()=>{ document.querySelector(`section[data-i="${i}"]`)?.scrollIntoView(); window.scrollBy(0, innerHeight*0.9); },60); };
    c.appendChild(btn);
   });
   s.appendChild(c);
  } else {
   const t=document.createElement('div'); t.className='txt'+(b.mood==='red'||b.mood==='pool'?' red':''); t.innerHTML=b.html; s.appendChild(t);
  }
  if(b.choice && route){ return; } // skip rendering the answered choice? keep it: allows re-choice
  story.appendChild(s);
 });
 const note=document.getElementById('routeNote');
 if(note) note.textContent = route ? (route==='refuge' ? 'the sky remembers: she carried it. (Honey Pot seed planted)' : 'the sky remembers: she let them go. (Empty Mirror seed planted)') : '';
 observeAll();
}

/* ============ SCROLL FX ============ */
let observer;
function observeAll(){
 observer && observer.disconnect();
 observer=new IntersectionObserver(es=>{
  es.forEach(e=>{
   if(e.isIntersecting){
    e.target.classList.add('lit');
    onEnter(e.target);
   }
  });
 },{threshold:.45});
 document.querySelectorAll('section').forEach(s=>observer.observe(s));
}
let scared=false;
function onEnter(s){
 const m=s.dataset.mood;
 setVeil(m==='red'||m==='descent'||m==='pool'||m==='harrow'?(m==='pool'?0.9:0.55):0);
 music.mood(m);
 const b=BEATS[+s.dataset.i]||{};
 if(b.sting){ sting(b.sting); if(b.shake){document.body.classList.remove('shake');void document.body.offsetWidth;document.body.classList.add('shake');} }
 if(b.flash) flash(.85);
 if(b.scare && !scared && !document.getElementById('safe').checked){ scared=true; setTimeout(jumpscare, 1400); }
}
function setVeil(o){ document.getElementById('redveil').style.opacity=o; }
function flash(op){ const f=document.getElementById('flash'); f.style.transition='none'; f.style.opacity=op;
 requestAnimationFrame(()=>{ f.style.transition='opacity 1.2s'; f.style.opacity=0; }); }
function jumpscare(){
 const sc=document.getElementById('scare'); sc.innerHTML=SCARE; sc.style.display='flex';
 sting('scare'); document.body.classList.add('shake');
 setTimeout(()=>{ sc.style.display='none'; document.body.classList.remove('shake'); }, 620);
}
// parallax
let ticking=false;
addEventListener('scroll',()=>{
 if(ticking) return; ticking=true;
 requestAnimationFrame(()=>{
  const h=document.body.scrollHeight-innerHeight;
  document.getElementById('hud').style.width=(scrollY/h*100)+'%';
  document.querySelectorAll('section').forEach(s=>{
   const r=s.getBoundingClientRect();
   if(r.bottom<0||r.top>innerHeight) return;
   const p=(r.top)/innerHeight;
   s.querySelector('.bg').style.transform=`translateY(${p*60}px) scale(1.06)`;
  });
  ticking=false;
 });
},{passive:true});

/* ============ MUSIC (synthesized — nothing copyrighted) ============ */
const music={ctx:null,master:null,cur:'',hb:null,
 start(){ this.ctx=new (window.AudioContext||window.webkitAudioContext)();
  this.master=this.ctx.createGain(); this.master.gain.value=.5; this.master.connect(this.ctx.destination);
  this.drone(); this.pluckLoop(); },
 drone(){ const c=this.ctx; this.dg=c.createGain(); this.dg.gain.value=.05; this.dg.connect(this.master);
  this.dOsc=[55,55.7,110.3].map(f=>{ const o=c.createOscillator(); o.type='sine'; o.frequency.value=f; o.connect(this.dg); o.start(); return o; }); },
 scaleFor(m){ return (m==='red'||m==='descent'||m==='pool')?[220,261.6,293.7,349.2,392]:
   (m==='harrow'||m==='sacrifice')?[261.6,293.7,329.6,392,440]:[233,261.6,311.1,349.2,415.3]; },
 pluck(f,vol){ const c=this.ctx,t=c.currentTime; const o=c.createOscillator(),g=c.createGain();
  o.type='triangle'; o.frequency.value=f;
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+2.2);
  o.connect(g); g.connect(this.master); o.start(t); o.stop(t+2.3); },
 pluckLoop(){ const step=()=>{ if(this.cur!=='still'&&this.cur!=='pool'){
    const sc=this.scaleFor(this.cur); this.pluck(sc[Math.floor(Math.random()*sc.length)]/(Math.random()<.3?2:1), .07); }
   const slow=(this.cur==='aria'||this.cur==='end'||this.cur==='ice');
   setTimeout(step, (slow?1700:900)+Math.random()*900); }; step(); },
 mood(m){ if(!this.ctx||m===this.cur) return; this.cur=m;
  const dark=(m==='red'||m==='descent'||m==='pool');
  this.dOsc.forEach((o,i)=>o.frequency.linearRampToValueAtTime(dark?[41.2,41.7,82.9][i]:[55,55.7,110.3][i],this.ctx.currentTime+2));
  this.dg.gain.linearRampToValueAtTime(dark?.09:.05,this.ctx.currentTime+2);
  if(m==='pool'&&!this.hb){ this.hb=setInterval(()=>{ this.thump(); setTimeout(()=>this.thump(),300); },1500); }
  else if(m!=='pool'&&this.hb){ clearInterval(this.hb); this.hb=null; } },
 thump(){ const c=this.ctx,t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.frequency.setValueAtTime(58,t); o.frequency.exponentialRampToValueAtTime(38,t+.18);
  g.gain.setValueAtTime(.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.25);
  o.connect(g); g.connect(this.master); o.start(t); o.stop(t+.3); }
};
function sting(kind){ if(!music.ctx) return; const c=music.ctx,t=c.currentTime;
 if(kind==='wood'){ const o=c.createOscillator(),g=c.createGain(); o.type='square'; o.frequency.value=1100;
  g.gain.setValueAtTime(.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.connect(g); g.connect(music.master); o.start(t); o.stop(t+.1); music.thump(); }
 if(kind==='scare'){ const n=c.createBufferSource(),buf=c.createBuffer(1,c.sampleRate*.5,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf; const g=c.createGain(); g.gain.value=.7; n.connect(g); g.connect(music.master); n.start();
  music.thump(); setTimeout(()=>music.thump(),120); }
 if(kind==='choice'){ [392,523.3,659.3].forEach((f,i)=>setTimeout(()=>music.pluck(f,.2),i*140)); }
}

document.getElementById('begin').onclick=()=>{
 music.start();
 const g=document.getElementById('gate'); g.style.opacity=0;
 setTimeout(()=>g.remove(),1500);
 sting('wood');
};
function restart(){ scrollTo({top:0}); }
function otherRoute(){ route=(route==='refuge')?'release':'refuge'; localStorage.setItem('ss_route',route); build();
 const i=BEATS.findIndex(b=>b.branch===route);
 setTimeout(()=>document.querySelector(`section[data-i="${i}"]`)?.scrollIntoView({behavior:'smooth'}),80); }
build();
